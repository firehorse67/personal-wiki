<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Personal Wiki Clipper Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 24px;
      background: #ffffff;
      color: #1d2129;
      border: 1px solid #e2e4e8;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }
    h2 {
      margin-top: 0;
      color: #00361f;
      font-size: 20px;
      font-weight: 600;
      border-bottom: 1px solid #e2e4e8;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #4c525d;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cfd3da;
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
      background: #ffffff;
      outline: none;
      transition: border-color 0.15s ease;
    }
    input:focus {
      border-color: #c66930;
    }
    button {
      background: #00361f;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover {
      background: #004d2c;
    }
    #status {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <h2>Personal Wiki Clipper Settings</h2>
  
  <p style="font-size: 13px; color: #4c525d; line-height: 1.5; margin-bottom: 20px;">
    Configure your server connection below. These details are stored locally inside your browser extension.
  </p>

  <div class="form-group">
    <label for="server-url">Wiki Server URL</label>
    <input type="text" id="server-url" placeholder="http://localhost:5173 or https://wiki.example.com">
  </div>

  <div class="form-group">
    <label for="token">API Bearer Token</label>
    <input type="password" id="token" placeholder="Paste your API token here">
  </div>

  <button id="save">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
