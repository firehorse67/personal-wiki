<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f8f9fa;
      color: #1d2129;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 12px;
      color: #00361f;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .options-link {
      font-size: 12px;
      color: #c66930;
      text-decoration: none;
      cursor: pointer;
      font-weight: 500;
    }
    .options-link:hover {
      text-decoration: underline;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #4c525d;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    input[type="text"], textarea, select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cfd3da;
      border-radius: 6px;
      padding: 8px;
      font-size: 13px;
      font-family: inherit;
      background: #ffffff;
      color: #1d2129;
      outline: none;
      transition: border-color 0.15s ease;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #c66930;
    }
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    button {
      flex: 1;
      border: none;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    button.primary {
      background: #00361f;
      color: #ffffff;
    }
    button.primary:hover {
      background: #004d2c;
    }
    button.warning-btn {
      background: #c66930;
      color: #ffffff;
    }
    button.warning-btn:hover {
      background: #a85827;
    }
    #status {
      margin-top: 12px;
      font-size: 12px;
      padding: 8px;
      border-radius: 4px;
      display: none;
      word-break: break-all;
    }
    #status.success {
      display: block;
      background: #e6fcf5;
      color: #0ca678;
      border: 1px solid #c3fae8;
    }
    #status.error {
      display: block;
      background: #fff5f5;
      color: #fa5252;
      border: 1px solid #ffe3e3;
    }
    #setup-warning {
      display: none;
      background: #fff9db;
      border: 1px solid #ffe066;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 12px;
    }
    #setup-warning p {
      margin: 0 0 10px 0;
      font-size: 13px;
      color: #b07d00;
      line-height: 1.4;
    }
    #main-form {
      display: block;
    }
  </style>
</head>
<body>
  <h3>
    <span>Personal Wiki Clipper</span>
    <a id="open-options" class="options-link">Settings</a>
  </h3>

  <div id="setup-warning">
    <p>Clipper settings are missing. Please configure your server URL and token.</p>
    <button id="go-to-options" class="warning-btn">Open Settings</button>
  </div>

  <div id="main-form">
    <div class="form-group">
      <label for="clip-mode">Clip Mode</label>
      <select id="clip-mode">
        <option value="article">Whole Page (Text)</option>
        <option value="selection">Selected Section</option>
        <option value="screenshot">Screenshot (Visible)</option>
        <option value="screenshot-area">Screenshot (Select Area)</option>
        <option value="screenshot-full">Screenshot (Full Page)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="Loading...">
    </div>

    <div class="form-group" style="display: none;">
      <label for="url">URL</label>
      <input type="text" id="url" placeholder="Loading...">
    </div>

    <div class="form-group">
      <label for="description">Description / Notes (Optional)</label>
      <textarea id="description" rows="3" placeholder="Add a description or notes..."></textarea>
    </div>

    <div class="button-group">
      <button id="clip-btn" class="primary">Clip to Web Clips</button>
    </div>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
